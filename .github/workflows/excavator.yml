name: Excavator

on:
  workflow_dispatch:
  schedule:
    # run every 4 hours
    - cron: "20 */4 * * *"

permissions:
  contents: write

jobs:
  excavate:
    name: Excavate
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          $installer = Join-Path $env:TEMP 'scoop-install.ps1'
          Invoke-WebRequest 'https://raw.githubusercontent.com/ScoopInstaller/Install/b0ee913725139b816f9178163af0aecdba07a7ed/install.ps1' -UseBasicParsing -OutFile $installer
          & $installer
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $env:USERPROFILE 'scoop\shims')
      - name: Configure git
        shell: pwsh
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - name: Setup SSH for push
        shell: pwsh
        env:
          EXCAVATOR_SSH_KEY: ${{ secrets.EXCAVATOR_SSH_KEY }}
        run: |
          $sshDir = Join-Path $env:USERPROFILE '.ssh'
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null

          # 秘密鍵を書き込む（CRLF を LF に変換し末尾改行を保証して OpenSSH が読める形式にする）
          $keyPath = Join-Path $sshDir 'excavator_ed25519'
          $keyContent = $env:EXCAVATOR_SSH_KEY -replace "`r`n", "`n" -replace "`r", "`n"
          if (-not $keyContent.EndsWith("`n")) { $keyContent += "`n" }
          [System.IO.File]::WriteAllBytes($keyPath, [System.Text.Encoding]::ASCII.GetBytes($keyContent))

          # Windows OpenSSH は ACL が緩いと鍵を拒否するため権限を絞る
          icacls $keyPath /inheritance:r /grant:r "${env:USERNAME}:F" | Out-Null

          # known_hosts に GitHub を登録
          $knownHostsPath = Join-Path $sshDir 'known_hosts'
          ssh-keyscan -H github.com 2>$null | Out-File -FilePath $knownHostsPath -Encoding ascii

          # SSH config を設定（GitHub 接続時に excavator_ed25519 を使用、BatchMode で認証失敗時に即座エラー）
          $sshConfigPath = Join-Path $sshDir 'config'
          Set-Content -Path $sshConfigPath -Value "Host github.com" -Encoding ascii
          Add-Content -Path $sshConfigPath -Value "    IdentityFile $keyPath" -Encoding ascii
          Add-Content -Path $sshConfigPath -Value "    StrictHostKeyChecking yes" -Encoding ascii
          Add-Content -Path $sshConfigPath -Value "    UserKnownHostsFile $knownHostsPath" -Encoding ascii
          Add-Content -Path $sshConfigPath -Value "    BatchMode yes" -Encoding ascii

          # SSH 接続テストで Deploy Key 認証を事前確認（exit 1 は GitHub の正常動作）
          Write-Host 'Testing SSH connection to GitHub...'
          $sshOutput = ssh -T git@github.com 2>&1
          Write-Host $sshOutput
          if ($sshOutput -notmatch 'successfully authenticated') {
            Write-Error 'SSH authentication failed. Verify EXCAVATOR_SSH_KEY secret matches the registered deploy key.'
            exit 1
          }

          # Deploy Key で Ruleset をバイパスするため SSH URL に変更
          git remote set-url origin "git@github.com:$($env:GITHUB_REPOSITORY).git"
      - name: Excavate
        shell: pwsh
        env:
          SCOOP_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $scoopHome = scoop prefix scoop
          $bucketDir = Join-Path $env:GITHUB_WORKSPACE 'bucket'

          # 全マニフェストのバージョンチェックと更新
          & (Join-Path $scoopHome 'bin\checkver.ps1') -Dir $bucketDir -Update -SkipUpdated

          # 変更されたマニフェストを取得
          $changedFiles = git diff --name-only | Where-Object { $_ -like 'bucket/*.json' }

          if (-not $changedFiles) {
            Write-Host 'No updates found.'
            exit 0
          }

          foreach ($file in $changedFiles) {
            $app = [System.IO.Path]::GetFileNameWithoutExtension($file)
            $json = Get-Content $file -Raw | ConvertFrom-Json
            $version = $json.version

            Write-Host "Pushing update: $app $version"
            git add $file
            git commit -m "${app}: Update to version ${version}"
          }

          git push origin master
